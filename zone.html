<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zone — Glen's Garden</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="zone-page">

  <!-- Standard header (backyard zones) -->
  <header class="page-header" id="page-header">
    <a href="index.html" class="back-link" id="back-link">↓ Garden</a>
    <div class="header-title">
      <span id="zone-number-label" class="zone-number-label"></span>
      <h1 id="zone-name"></h1>
    </div>
  </header>

  <!-- Front yard lateral nav (shown only for front-yard zones) -->
  <nav class="lateral-nav" id="lateral-nav" aria-label="Front yard zones">
    <a id="lateral-prev" class="lateral-btn lateral-prev" href="#">←</a>
    <a href="index.html" class="lateral-home">↓ Garden</a>
    <a id="lateral-next" class="lateral-btn lateral-next" href="#">→</a>
  </nav>

  <main>
    <p id="zone-description" class="zone-description"></p>

    <div class="zone-image-wrapper" id="image-wrapper">
      <img id="zone-image" class="zone-image" src="" alt="" />
      <div id="hotspots" class="hotspots"></div>
    </div>

    <p class="tap-hint">Tap a dot to explore a plant.</p>

    <div id="plant-list" class="plant-list"></div>
  </main>

  <!-- Plant drawer -->
  <div id="plant-drawer" class="plant-drawer" aria-hidden="true">
    <div class="drawer-handle" id="drawer-handle"></div>
    <div class="drawer-content" id="drawer-content"></div>
  </div>
  <div id="drawer-backdrop" class="drawer-backdrop"></div>

  <script src="photo-config.js"></script>
  <script src="app.js"></script>
  <script>
    async function initZone() {
      const zoneId = getParam('zone');
      if (!zoneId) { window.location = 'index.html'; return; }

      const data = await loadGardenData();
      const zone = getZone(data, zoneId);
      if (!zone) { window.location = 'index.html'; return; }

      document.title = `${zone.name} — Glen's Garden`;
      document.getElementById('zone-number-label').textContent = `Zone ${zone.id}`;
      document.getElementById('zone-name').textContent = zone.name;
      document.getElementById('zone-description').textContent = zone.description;

      const img = document.getElementById('zone-image');
      img.src = getPhotoUrl(zone.overview_photo);
      img.alt = zone.name + ' overview';

      // Front yard zones: show lateral nav, hide standard back link
      if (zone.front_yard) {
        document.getElementById('page-header').style.display = 'none';
        const lateralNav = document.getElementById('lateral-nav');
        lateralNav.style.display = 'flex';

        const frontYardZones = data.zones
          .filter(z => z.front_yard)
          .sort((a, b) => a.front_yard_order - b.front_yard_order);

        const idx = frontYardZones.findIndex(z => z.id === zone.id);
        const prevZone = frontYardZones[idx - 1];
        const nextZone = frontYardZones[idx + 1];

        const prevBtn = document.getElementById('lateral-prev');
        const nextBtn = document.getElementById('lateral-next');

        if (prevZone) {
          prevBtn.href = `zone.html?zone=${prevZone.id}`;
          prevBtn.innerHTML = `← ${prevZone.name}`;
        } else {
          prevBtn.classList.add('hidden');
        }

        if (nextZone) {
          nextBtn.href = `zone.html?zone=${nextZone.id}`;
          nextBtn.innerHTML = `${nextZone.name} →`;
        } else {
          nextBtn.classList.add('hidden');
        }
      }

      // Hotspot dots
      const hotspotsEl = document.getElementById('hotspots');
      zone.plants.forEach(plant => {
        if (!plant.hotspot) return;
        const dot = document.createElement('button');
        dot.className = 'hotspot-dot';
        dot.style.left = plant.hotspot.x + '%';
        dot.style.top  = plant.hotspot.y + '%';
        dot.setAttribute('aria-label', plant.name);

        if (DEV_MODE) {
          const lbl = document.createElement('span');
          lbl.className = 'hotspot-dev-label';
          lbl.textContent = `${plant.name} (${plant.hotspot.x},${plant.hotspot.y})`;
          dot.appendChild(lbl);
        }

        dot.addEventListener('click', () => openDrawer(plant, zone));
        hotspotsEl.appendChild(dot);
      });

      // Plant list below image
      const list = document.getElementById('plant-list');
      if (zone.plants.length === 0) {
        list.innerHTML = '<p class="empty-note">Plant profiles coming soon.</p>';
      } else {
        zone.plants.forEach(plant => {
          const card = document.createElement('a');
          card.href = `plant.html?zone=${zone.id}&plant=${plant.id}`;
          card.className = 'plant-list-item';
          card.innerHTML = `
            <div class="plant-list-thumb">
              <img src="${getPhotoUrl(plant.photos[0])}" alt="${plant.name}" loading="lazy" />
            </div>
            <div class="plant-list-info">
              <h3>${plant.name}</h3>
              ${statusBadge(plant.status)}
              <p>${plant.highlights[0] || ''}</p>
            </div>
            <span class="plant-list-arrow">›</span>
          `;
          list.appendChild(card);
        });
      }
    }

    function openDrawer(plant, zone) {
      const drawer = document.getElementById('plant-drawer');
      const content = document.getElementById('drawer-content');
      const backdrop = document.getElementById('drawer-backdrop');

      content.innerHTML = `
        <div class="drawer-plant-header">
          <h2>${plant.name}</h2>
          ${statusBadge(plant.status)}
        </div>
        <img class="drawer-thumb" src="${getPhotoUrl(plant.photos[0])}" alt="${plant.name}" />
        <p class="drawer-highlight">${plant.highlights[0] || ''}</p>
        <a class="drawer-full-link" href="plant.html?zone=${zone.id}&plant=${plant.id}">
          Full profile →
        </a>
      `;

      drawer.classList.add('open');
      drawer.setAttribute('aria-hidden', 'false');
      backdrop.classList.add('visible');
    }

    function closeDrawer() {
      document.getElementById('plant-drawer').classList.remove('open');
      document.getElementById('plant-drawer').setAttribute('aria-hidden', 'true');
      document.getElementById('drawer-backdrop').classList.remove('visible');
    }

    document.getElementById('drawer-backdrop').addEventListener('click', closeDrawer);
    document.getElementById('drawer-handle').addEventListener('click', closeDrawer);

    initZone();
  </script>
</body>
</html>
