<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hotspot Calibration — Glen's Garden</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f3efe6; color: #2a2a2a; padding-bottom: 4rem; }
    header { position: sticky; top: 0; z-index: 50; background: #2d4a1e; color: #fff; padding: 0.75rem 1rem; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
    header h1 { font-size: 1rem; font-weight: 600; }
    .toolbar { display: flex; gap: .5rem; margin-top: .5rem; flex-wrap: wrap; align-items: center; }
    .toolbar button { font-size: .8rem; padding: .45rem .7rem; border: 0; border-radius: 6px; background: #c8d5b9; color: #2d4a1e; font-weight: 600; cursor: pointer; }
    .toolbar button.primary { background: #f0c14b; }
    .readout { font-size: .8rem; color: #e8efe0; margin-left: auto; font-variant-numeric: tabular-nums; }
    .legend { display: flex; gap: .8rem; font-size: .72rem; margin-top: .45rem; flex-wrap: wrap; }
    .legend span { display: inline-flex; align-items: center; gap: .3rem; }
    .swatch { width: 12px; height: 12px; border-radius: 50%; display: inline-block; border: 2px solid #fff; }
    /* rotation dial — shown only when a nav arrow is selected */
    .rotbar { display: none; align-items: center; gap: .4rem; margin-top: .55rem; background: rgba(255,255,255,.12); padding: .4rem .55rem; border-radius: 8px; flex-wrap: wrap; }
    .rotbar span.lbl { font-size: .75rem; font-weight: 600; }
    .rotbar button { width: 30px; height: 30px; border: 0; border-radius: 6px; background: #c8d5b9; color: #2d4a1e; font-size: 1rem; font-weight: 700; cursor: pointer; }
    .rotbar input[type=range] { flex: 1; min-width: 120px; accent-color: #f0c14b; }
    .rotbar input[type=number] { width: 3.6rem; padding: .25rem; border-radius: 4px; border: 0; text-align: center; }
    .rotbar .deg { font-size: .8rem; min-width: 2.6rem; text-align: right; font-variant-numeric: tabular-nums; }
    .block { background: #fff; margin: 1rem; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .block-title { padding: .6rem .9rem; font-weight: 600; font-size: .9rem; background: #ede6d6; display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }
    .block-title .addnav { margin-left: auto; display: flex; gap: .35rem; align-items: center; }
    .block-title select { font-size: .75rem; padding: .25rem; border-radius: 5px; border: 1px solid #c4baa6; max-width: 11rem; }
    .block-title .addnav button { font-size: .75rem; padding: .3rem .55rem; border: 0; border-radius: 5px; background: #c47c2b; color: #fff; font-weight: 600; cursor: pointer; }
    .img-wrap { position: relative; width: 100%; touch-action: none; user-select: none; -webkit-user-select: none; }
    .img-wrap img { display: block; width: 100%; height: auto; }
    .dot { position: absolute; transform: translate(-50%, -50%); width: 32px; height: 32px; border-radius: 50%;
           border: 2.5px solid #fff; display: flex; align-items: center; justify-content: center;
           color: #fff; font-size: 13px; font-weight: 700; cursor: grab; box-shadow: 0 1px 5px rgba(0,0,0,.45); touch-action: none; }
    .dot.sel { outline: 3px solid #f0c14b; outline-offset: 2px; z-index: 10; }
    .dot .na { display: inline-block; font-size: 17px; line-height: 1; }
    .dot .badge { position: absolute; top: -7px; right: -7px; background: #222; color: #fff; font-size: 10px; width: 15px; height: 15px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #fff; }
    table { width: 100%; border-collapse: collapse; font-size: .8rem; }
    th, td { padding: .35rem .5rem; border-bottom: 1px solid #eee; text-align: left; }
    th { background: #faf7f0; font-size: .68rem; text-transform: uppercase; letter-spacing: .04em; color: #777; }
    td .num { width: 3.6rem; padding: .25rem; border: 1px solid #ccc; border-radius: 4px; font-size: .85rem; text-align: center; }
    .rownum { width: 20px; height: 20px; border-radius: 50%; color: #fff; font-size: 11px; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; }
    tr.active td { background: #fffbe9; }
    .hint { font-size: .75rem; color: #555; padding: .5rem .9rem; background: #fafafa; }
  </style>
</head>
<body>
  <header>
    <h1>🌱 Hotspot Calibration</h1>
    <div class="toolbar">
      <button class="primary" id="btn-download">⬇ Download JSON</button>
      <button id="btn-copy">📋 Copy coordinates</button>
      <span class="readout" id="readout">drag a dot</span>
    </div>
    <div class="rotbar" id="rotbar">
      <span class="lbl">Rotate arrow:</span>
      <button data-a="180" title="left">←</button>
      <button data-a="270" title="up">↑</button>
      <button data-a="0" title="right">→</button>
      <button data-a="90" title="down">↓</button>
      <input type="range" id="rotRange" min="0" max="359" step="5" value="0">
      <input type="number" id="rotNum" min="0" max="359" step="5" value="0">
      <span class="deg" id="rotVal">0°</span>
    </div>
    <div class="legend">
      <span><i class="swatch" style="background:#7a3aa0"></i>landing</span>
      <span><i class="swatch" style="background:#4a7a3a"></i>plant</span>
      <span><i class="swatch" style="background:#2f6fb0"></i>area</span>
      <span><i class="swatch" style="background:#c47c2b"></i>nav arrow</span>
    </div>
  </header>

  <div id="sections"></div>

  <script src="photo-config.js"></script>
  <script>
    const TYPE_COLOR = { landing:'#7a3aa0', plant:'#4a7a3a', sub_zone:'#2f6fb0', nav:'#c47c2b' };
    let DATA, selected = null;
    const allHandles = [];
    const zoneById = id => DATA.zones.find(z => z.id === id);

    async function init() {
      DATA = await (await fetch('garden-data.json?_=' + Date.now())).json();
      const root = document.getElementById('sections');

      const hero = zoneById('01');
      const landingDots = DATA.zones.filter(z => z.landing_hotspot).map(z => ({
        ref: z.landing_hotspot, type: 'landing', name: z.landing_label || z.name,
        id: { kind: 'landing', zoneId: z.id } }));
      if (hero) root.appendChild(block('Landing / Hero', hero.overview_photo, landingDots));

      DATA.zones.forEach(z => {
        const dots = [];
        (z.plants || []).forEach(p => { if (p.hotspot) dots.push({
          ref: p.hotspot, type: 'plant', name: p.name,
          id: { kind: 'plant', zoneId: z.id, plantId: p.id } }); });
        (z.sub_zones || []).forEach((s, i) => { if (s.hotspot) dots.push({
          ref: s.hotspot, type: 'sub_zone', name: s.name,
          id: { kind: 'sub', zoneId: z.id, index: i } }); });
        (z.nav_hotspots || []).forEach(n => { if (n.hotspot) {
          if (n.style !== 'dot' && n.angle == null) n.angle = 0;
          const t = zoneById(n.target);
          dots.push({ ref: n.hotspot, type: 'nav', name: '→ ' + (n.label || (t ? t.name : n.target)),
            id: { kind: 'nav', zoneId: z.id, target: n.target }, navObj: n }); } });
        root.appendChild(block(`Zone ${z.id} — ${z.name}`, z.overview_photo, dots, z));
      });
    }

    function block(title, photo, dots, zone) {
      const el = document.createElement('div');
      el.className = 'block';
      let addControl = '';
      if (zone) {
        const opts = ['<option value="__home__">↩ Home / Backyard (index.html)</option>']
          .concat(DATA.zones
            .filter(z => z.id !== zone.id)
            .map(z => `<option value="${z.id}">${z.id} — ${z.name}</option>`))
          .join('');
        addControl = `<span class="addnav"><select>${opts}</select><button type="button">+ nav arrow</button></span>`;
      }
      el.innerHTML = `<div class="block-title"><span>${title}</span>${addControl}</div>
        <div class="hint">Drag a dot, or tap a dot then tap the photo to place it. Select a nav arrow to rotate it (dial up top).</div>
        <div class="img-wrap"><img src="${getPhotoUrl(photo)}" alt="${title}"></div>
        <table><thead><tr><th>#</th><th>Type</th><th>Name</th><th>X%</th><th>Y%</th></tr></thead><tbody></tbody></table>`;
      const wrap = el.querySelector('.img-wrap');
      const tbody = el.querySelector('tbody');
      let count = 0;

      function makeDot(d) {
        const n = ++count;
        const color = TYPE_COLOR[d.type];

        const dot = document.createElement('div');
        dot.className = 'dot';
        dot.style.background = color;
        place(dot, d.ref);
        if (d.type === 'nav' && d.navObj.style !== 'dot') {
          const g = document.createElement('span');
          g.className = 'na'; g.textContent = '→';
          g.style.transform = `rotate(${d.navObj.angle || 0}deg)`;
          const badge = document.createElement('span');
          badge.className = 'badge'; badge.textContent = n;
          dot.appendChild(g); dot.appendChild(badge);
          d.glyph = g;
        } else {
          dot.textContent = n;
        }
        wrap.appendChild(dot);

        const row = document.createElement('tr');
        row.innerHTML = `<td><span class="rownum" style="background:${color}">${n}</span></td>
          <td>${d.type}</td><td>${d.name}</td>
          <td><input class="num" type="number" min="0" max="100" step="1" value="${d.ref.x}"></td>
          <td><input class="num" type="number" min="0" max="100" step="1" value="${d.ref.y}"></td>`;
        const [xIn, yIn] = row.querySelectorAll('input');
        tbody.appendChild(row);

        const h = Object.assign(d, { dot, row, xIn, yIn, wrap, n });
        allHandles.push(h);

        dot.addEventListener('pointerdown', e => {
          e.preventDefault(); selectHandle(h);
          const move = ev => setFromEvent(h, ev);
          const up = () => { document.removeEventListener('pointermove', move); document.removeEventListener('pointerup', up); };
          document.addEventListener('pointermove', move); document.addEventListener('pointerup', up);
        });
        xIn.addEventListener('input', () => { d.ref.x = clamp(+xIn.value); place(dot, d.ref); readout(h); });
        yIn.addEventListener('input', () => { d.ref.y = clamp(+yIn.value); place(dot, d.ref); readout(h); });
        return h;
      }

      dots.forEach(makeDot);

      if (zone) {
        const sel = el.querySelector('.addnav select');
        el.querySelector('.addnav button').addEventListener('click', () => {
          const v = sel.value;
          const nav = { target: v, angle: 0, hotspot: { x: 50, y: 50 } };
          if (v === '__home__') { nav.target = '01'; nav.url = 'index.html'; nav.label = 'Backyard'; }
          zone.nav_hotspots = zone.nav_hotspots || [];
          zone.nav_hotspots.push(nav);
          const t = zoneById(nav.target);
          const h = makeDot({
            ref: nav.hotspot, type: 'nav',
            name: '→ ' + (nav.label || (t ? t.name : nav.target)),
            id: { kind: 'nav', zoneId: zone.id, target: nav.target }, navObj: nav });
          selectHandle(h);
          el.querySelector('.img-wrap').scrollIntoView({ behavior: 'smooth', block: 'center' });
        });
      }

      wrap.addEventListener('pointerdown', e => {
        if (e.target.closest('.dot')) return;
        if (selected && selected.wrap === wrap) setFromEvent(selected, e);
      });
      return el;
    }

    function selectHandle(h) {
      allHandles.forEach(o => { o.dot.classList.remove('sel'); o.row.classList.remove('active'); });
      h.dot.classList.add('sel'); h.row.classList.add('active'); selected = h;
      const rb = document.getElementById('rotbar');
      if (h.type === 'nav' && h.navObj.style !== 'dot') {
        rb.style.display = 'flex';
        const a = h.navObj.angle || 0;
        document.getElementById('rotRange').value = a;
        document.getElementById('rotNum').value = a;
        document.getElementById('rotVal').textContent = a + '°';
      } else { rb.style.display = 'none'; }
      readout(h);
    }

    function setAngle(v) {
      if (!selected || selected.type !== 'nav') return;
      v = ((Math.round(+v) % 360) + 360) % 360;
      selected.navObj.angle = v;
      if (selected.glyph) selected.glyph.style.transform = `rotate(${v}deg)`;
      document.getElementById('rotRange').value = v;
      document.getElementById('rotNum').value = v;
      document.getElementById('rotVal').textContent = v + '°';
      readout(selected);
    }
    document.getElementById('rotRange').addEventListener('input', e => setAngle(e.target.value));
    document.getElementById('rotNum').addEventListener('input', e => setAngle(e.target.value));
    document.querySelectorAll('.rotbar button').forEach(b => b.addEventListener('click', () => setAngle(b.dataset.a)));

    function setFromEvent(h, ev) {
      const r = h.wrap.getBoundingClientRect();
      h.ref.x = clamp(Math.round((ev.clientX - r.left) / r.width * 100));
      h.ref.y = clamp(Math.round((ev.clientY - r.top) / r.height * 100));
      place(h.dot, h.ref); h.xIn.value = h.ref.x; h.yIn.value = h.ref.y; readout(h);
    }
    function place(dot, ref) { dot.style.left = ref.x + '%'; dot.style.top = ref.y + '%'; }
    function clamp(v) { return Math.max(0, Math.min(100, isNaN(v) ? 0 : v)); }
    function readout(h) {
      const base = `${h.name}: ${h.ref.x}, ${h.ref.y}`;
      const isArrow = h.type === 'nav' && h.navObj.style !== 'dot';
      document.getElementById('readout').textContent = isArrow ? `${base} · ${h.navObj.angle || 0}°` : base;
    }

    document.getElementById('btn-download').addEventListener('click', () => {
      const blob = new Blob([JSON.stringify(DATA, null, 2) + '\n'], { type: 'application/json' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = 'garden-data.json'; a.click();
    });

    document.getElementById('btn-copy').addEventListener('click', async () => {
      const lines = allHandles.map(h => {
        const id = h.id;
        if (id.kind === 'landing') return `landing ${id.zoneId} -> ${h.ref.x},${h.ref.y}`;
        if (id.kind === 'plant')   return `plant ${id.zoneId} ${id.plantId} -> ${h.ref.x},${h.ref.y}`;
        if (id.kind === 'sub')     return `sub ${id.zoneId} #${id.index} (${h.name}) -> ${h.ref.x},${h.ref.y}`;
        if (id.kind === 'nav')     return (h.navObj.style === 'dot')
          ? `nav ${id.zoneId} ${id.target} -> ${h.ref.x},${h.ref.y}`
          : `nav ${id.zoneId} ${id.target} -> ${h.ref.x},${h.ref.y} @${h.navObj.angle || 0}`;
      });
      const text = 'HOTSPOTS\n' + lines.join('\n');
      try { await navigator.clipboard.writeText(text); document.getElementById('readout').textContent = 'copied ' + lines.length + ' coords'; }
      catch { prompt('Copy these coordinates:', text); }
    });

    init();
  </script>
</body>
</html>
